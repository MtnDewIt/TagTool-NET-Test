name: TagTool Build

on:
  push:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Determine Version
      id: determine_version
      run: |
        $version = (git rev-parse --short=7 HEAD).Trim()
        Write-Output "Version determined: $version"
        Write-Host "::set-output name=version::$version"

    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1.0.5

    - name: Restore Packages
      run: nuget restore TagTool.slnx

    - name: Build solution
      run: msbuild TagTool.slnx -t:rebuild -property:Platform=x64 -property:Configuration=Release

    - name: Zip Release
      run: |
        7z a Release_x64.7z ./TagTool/bin/x64/Release/*
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: Release_x64.7z
        tag_name: ${{ steps.determine_version.outputs.version }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
